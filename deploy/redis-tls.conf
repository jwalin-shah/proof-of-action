# Proof-of-Action — Redis with TLS + two-user ACL (Phase G6).
#
# Usage:
#   ./scripts/tls-bootstrap.sh          # generate certs into private/tls/
#   redis-server deploy/redis-tls.conf  # start on :6390 (TLS) + :6391 (plain, localhost-only)
#
# The plain port is kept for redis-cli ergonomics during onboarding. Once
# TLS is verified, drop `port 6391` to go TLS-only.

bind 127.0.0.1 -::1

# TLS-only data port. Agent + doctor hit this.
port 0
tls-port 6390
tls-cert-file ./private/tls/redis.crt
tls-key-file  ./private/tls/redis.key
tls-ca-cert-file ./private/tls/ca.crt

# Require client certs (mTLS). A private worker without private/tls/agent.*
# cannot even open a socket — this is the infra-layer proof that a leaked
# public-plane creds file alone can't reach the private keyspace.
tls-auth-clients yes
tls-protocols "TLSv1.2 TLSv1.3"

# ACLs — same two-user model as the plaintext demo. Paired with mTLS, a
# client must (a) hold agent.key, (b) auth as agent_private with PW. Both.
# Demo passwords; operators should replace before exposing this config.
# Redis config files don't expand shell vars — edit in place or templatize.
user default off
user agent_private on >privpw ~private:* resetchannels +@all -@dangerous
user agent_public  on >pubpw  ~public:*  resetchannels +@all -@dangerous

# Demo-grade persistence — private data lives in memory + AOF only.
appendonly yes
appendfsync everysec
dir ./private/redis-data
