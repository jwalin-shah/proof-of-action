---
# Proof-of-Action — Ollama on Akash GPU.
#
# This is the ONLY piece of the system we deploy to decentralized compute.
# The private worker (Python agent + Redis + envelope keys) stays on the
# operator's laptop — deploying it off-machine would collapse the privacy
# thesis. What we run here is an operator-controlled LLM inference endpoint
# so the agent never has to call Anthropic / OpenAI.
#
# Trust chain with this deployed:
#   operator laptop  →  YOUR Akash Ollama  →  nobody else
#
# Usage in Akash Console:
#   1. "Run Custom Container" → paste / upload this SDL
#   2. Accept the cheapest bid showing a GPU
#   3. Grab the public URL from Leases → Services
#   4. Preload the model:
#        curl -X POST https://<URL>/api/pull -d '{"name":"llama3.1:8b"}'
#   5. Point the agent at it via .env.local:
#        POA_LLM=ollama
#        POA_OLLAMA_URL=https://<URL>
#        POA_OLLAMA_MODEL=llama3.1:8b

version: "2.0"

services:
  ollama:
    image: ollama/ollama:latest
    expose:
      - port: 11434
        as: 80
        to:
          - global: true
    env:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m

profiles:
  compute:
    ollama:
      resources:
        cpu:
          units: 4
        memory:
          size: 16Gi
        storage:
          - size: 40Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx4090
                - model: rtx3090
                - model: a4000
                - model: a5000
                - model: a6000
                - model: a100
                - model: h100
  placement:
    akash:
      pricing:
        ollama:
          denom: uakt
          # ~$0.25/hr cap. Your $100 credit lasts weeks at this rate.
          amount: 10000

deployment:
  ollama:
    akash:
      profile: ollama
      count: 1
